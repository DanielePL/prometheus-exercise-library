name: prometheus-exercise-library
region: sgp
services:
  - name: prometheus-api
    github:
      branch: main
      deploy_on_push: true
    source_dir: /
    http_port: 3001
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: MONGODB_URI
        value: ${mongodb_uri}
        type: SECRET
      - key: OPENAI_API_KEY
        value: ${openai_api_key}
        type: SECRET
      - key: JWT_SECRET
        value: ${jwt_secret}
        type: SECRET
    build_command: npm install && cd client && npm install && CI=false npm run build && cd .. && cd server && npm install
    run_command: node server/src/index.js 