services:
  # Web service - Node.js server running Express
  - type: web
    name: prometheus-server
    env: node
    plan: free
    buildCommand: |
      npm install
      mkdir -p client/build
      cd client
      npm install || true
      CI=false npm run build || echo "Client build failed, using fallback"
      cd ..
      # Ensure client/build exists and has index.html
      mkdir -p client/build
      if [ ! -f client/build/index.html ]; then
        cp client/public/index-fallback.html client/build/index.html || echo "Public fallback copy failed"
        if [ ! -f client/build/index.html ]; then
          cp fallback.html client/build/index.html || echo "Root fallback copy failed"
          echo "Created emergency fallback index.html"
        else
          echo "Created fallback index.html from public dir"
        fi
      fi
      cd server
      npm install
      cd ..
      ls -la client/build
    startCommand: node verify-build.js && node server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        value: "prometheus_secure_jwt_key_for_authentication"
    healthCheckPath: /api/health 