services:
  # Web service - Node.js server running Express
  - type: web
    name: prometheus-server
    env: node
    plan: free
    buildCommand: npm install && cd client && npm install && npm run build && cd ..
    startCommand: node server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
    healthCheckPath: /api/health 