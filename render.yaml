services:
  # Web service - Node.js server running Express
  - type: web
    name: prometheus-server
    env: node
    plan: free
    buildCommand: |
      npm install
      cd client
      npm install
      CI=false npm run build
      cd ..
      cd server
      npm install
      cd ..
      mkdir -p client/build
      cp client/public/index-fallback.html client/build/index.html || echo "Fallback copy failed"
      ls -la client/build
    startCommand: node verify-build.js && node server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        value: "prometheus_secure_jwt_key_for_authentication"
    healthCheckPath: /api/health 